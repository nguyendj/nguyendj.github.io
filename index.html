<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nguyen Dang Dung | Bio</title>
    <style>
        :root {
            --bg-color: #f4f4f9;
            --text-color: #333;
            --accent-color: #007bff;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .bio-card {
            background: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 400px;
            text-align: center;
        }
        .bio-card img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
            border: 3px solid var(--accent-color);
        }
        .bio-card h1 {
            margin: 0 0 10px;
            font-size: 24px;
        }
        .bio-card p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 25px;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .links a {
            text-decoration: none;
            color: #fff;
            background-color: var(--accent-color);
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        .links a:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="bio-card">
        <img src="https://via.placeholder.com/150" alt="Avatar">
        <h1>Nguyen Dang Dung</h1>
        <p>Quản lý hệ thống đường sắt đô thị | Đam mê Network Administration, Home Automation & Self-hosting.</p>
        
        <div class="links">
            <a href="mailto:ttcnvgh@gmail.com">Liên hệ Email</a>
            <a href="https://github.com/yourusername" target="_blank">GitHub</a>
            <a href="#" target="_blank">LinkedIn</a>
        </div>
    </div>

</body>
</html>
